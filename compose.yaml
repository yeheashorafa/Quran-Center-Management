services:
  postgres:
    image: postgres:17-alpine
    container_name: quran-center-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quran_center}
      POSTGRES_USER: ${POSTGRES_USER:-quran_center}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quran_center_dev}
      TZ: Asia/Hebron
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quran_center_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quran_center} -d ${POSTGRES_DB:-quran_center}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quran_center_postgres_data:
